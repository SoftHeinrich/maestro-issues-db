version: "3.1"
services:
  psql:
    container_name: psql
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - maestro_traefik

  adminer:
    image: adminer
    restart: always
    environment:
      - ADMINER_DEFAULT_SERVER=psql
    networks:
      - maestro_traefik

  mongo:
    container_name: mongo
    image: mongo
    restart: always
    command: --wiredTigerCacheSizeGB 1 --auth
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - ./data:/data/db
    networks:
      - maestro_traefik

  mongo-express:
    image: mongo-express
    restart: always
    environment:
      - ME_CONFIG_MONGODB_URL=${MONGO_URL}
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USER}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD}
    networks:
      - maestro_traefik

  issues-db-api:
    container_name: issues-db-api
    build: ./issues-db-api/
    image: issues-db-api
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "api.openai.com:162.159.140.245"
    networks:
      - maestro_traefik
    env_file:
      - ../archRag/.env
      - ../.env
    environment:
      - MONGO_URL=${MONGO_URL}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://maestro.localhost:4269}
      - DOCKER=True
      - DEBUG=FALSE
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.issues-db-api.rule=Host(`${MAESTRO_HOST:-maestro.localhost}`) && PathPrefix(`/issues-db-api`)"
      - "traefik.http.routers.issues-db-api.entrypoints=websecure"
      - "traefik.http.routers.issues-db-api.tls=true"
      - "traefik.http.routers.issues-db-api.middlewares=issues-db-api"
      - "traefik.http.middlewares.issues-db-api.stripprefix.prefixes=/issues-db-api"
      - "traefik.http.services.issues-db-api.loadbalancer.server.port=8000"
    volumes:
      - ./issues-db-api/:/python-docker
  backup-issues-db:
    container_name: backup-issues-db
    build: ./backup/
    image: backup-issues-db
    env_file:
      - ../.env
    environment:
      - MONGO_URL=${MONGO_URL}

volumes:
  pgdata:

networks:
  maestro_traefik:
    external: true
