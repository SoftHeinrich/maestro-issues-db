version: "3.1"
services:
  psql:
    container_name: psql
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=issues
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - maestro_traefik

  adminer:
    image: adminer
    restart: always
    ports:
      - "8082:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=psql
    networks:
      - maestro_traefik

  mongo:
    container_name: mongo
    image: mongo
    restart: always
    command: --wiredTigerCacheSizeGB 1
    ports:
      - "27017:27017"
    volumes:
      - ./data:/data/db
    networks:
      - maestro_traefik

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    networks:
      - maestro_traefik

  issues-db-api:
    container_name: issues-db-api
    build: ./issues-db-api/
    image: issues-db-api
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "api.openai.com:162.159.140.245"
    networks:
      - maestro_traefik
    env_file:
      - ../archRag/.env
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DOCKER=True
      - DEBUG=TRUE
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.issues-db-api.rule=Host(`maestro.localhost`)"
      - "traefik.http.routers.issues-db-api.rule=PathPrefix(`/issues-db-api`)"
      - "traefik.http.routers.issues-db-api.entrypoints=websecure"
      - "traefik.http.routers.issues-db-api.tls=true"
      - "traefik.http.routers.issues-db-api.middlewares=issues-db-api"
      - "traefik.http.middlewares.issues-db-api.stripprefix.prefixes=/issues-db-api"
    volumes:
      - ./issues-db-api/:/python-docker
  backup-issues-db:
    container_name: backup-issues-db
    build: ./backup/
    image: backup-issues-db
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:

networks:
  maestro_traefik:
    external: true
